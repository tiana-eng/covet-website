<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="COVET Support — Get help with the Covet AI shopping assistant.">
  <title>Support — COVET</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

  <header class="site-header scrolled">
    <div class="container">
      <a href="index.html" class="logo"><img src="COVET LOGO/1.png" alt="Covet" class="logo-img"></a>
      <nav>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5"/>
          </svg>
        </button>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-hero">
      <div class="container">
        <h1>Support</h1>
        <p>We're here to help.</p>
      </div>
    </div>

    <div class="support-content">
      <div class="support-card animate">
        <h2>Need help?</h2>
        <p>Contact us at <a href="mailto:support@shopcovet.ai" class="support-email">support@shopcovet.ai</a></p>
        <p class="support-note">We typically respond within 1–2 business days.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <a href="index.html" class="footer-brand"><img src="COVET LOGO/1.png" alt="Covet" class="logo-img logo-img--footer"></a>
        <nav class="footer-links">
          <a href="privacy.html">Privacy Policy</a>
          <a href="terms.html">Terms</a>
          <a href="support.html">Support</a>
        </nav>
        <p class="footer-copy">COVET &copy; 2026 &middot; shopcovet.ai</p>
      </div>
    </div>
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');

    navToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', isOpen);
    });
  </script>

</body>
</html>
